backend = "glx";
vsync = true;

shadow = true;
shadow-opacity = 0.5;
shadow-radius = 20;
shadow-offset-x = -20;
shadow-offset-y = -10;
shadow-exclude = [
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3-frame'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'",
    "!I3_FLOATING_WINDOW@:c"
];

fading = true;
fade-delta = 2.5;
fade-in-step = 0.025;
fade-out-step = 0.025;

wintypes:
{
	tooltip =
	{
		fade = false;
		focus = true;
		shadow = false;
	};
	dnd = 
	{
		shadow = false;
	};
	dock = 
	{
		shadow = false;
	};
};
